name: Tweak Kompilierung (BHTikTok)

on:
  # Ermöglicht das manuelle Ausführen über die GitHub Actions Benutzeroberfläche
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build_tweak:
    # 1. Verwendung des macOS-Runners (notwendig für iOS/Theos-Kompilierung)
    runs-on: macos-latest

    steps:
    # 1. Checkout des Quellcodes
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # 2. Konfiguration der Theos-Umgebung
    # Fix: Klonen nach $HOME/theos, um Berechtigungsprobleme in /opt/ zu vermeiden.
    - name: Set up Theos Environment
      run: |
        echo "Installing necessary dependencies (ldid, dpkg)..."
        # Notwendige Tools für die DEB-Erstellung und Code-Signierung (ldid)
        brew install dpkg ldid coreutils
        
        # Klonen von Theos in das Home-Verzeichnis ($HOME/theos), das beschreibbar ist
        echo "Cloning Theos into $HOME/theos..."
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        
        # Hinzufügen des Theos-Binärpfads zur Umgebungsvariable
        echo "$HOME/theos/bin" >> $GITHUB_PATH
        export THEOS="$HOME/theos"
        
        echo "Theos installation complete."

    # 3. Kompilierung des Tweaks
    - name: Build Tweak (make package)
      # Führt make package aus, um die .deb-Datei zu erstellen
      run: |
        make package FINALPACKAGE=1

    # 4. Extrahieren der kompilierte Dateien
    - name: Extract Tweak Components (.dylib, .plist, .bundle)
      run: |
        DEB_FILE="com.bandarhl.bhtiktok_0.0.1_iphoneos-arm.deb"
        mkdir -p extracted_tweak
        
        echo "Extracting $DEB_FILE..."
        # Entpackt die .deb-Datei in den Ordner 'extracted_tweak'
        dpkg-deb -R $DEB_FILE extracted_tweak/
        
        # Kopiert die benötigten Komponenten in das Root-Verzeichnis des Workflows
        cp extracted_tweak/Library/MobileSubstrate/DynamicLibraries/BHTikTok.dylib .
        cp extracted_tweak/Library/MobileSubstrate/DynamicLibraries/BHTikTok.plist .
        
        # Kopieren des Einstellungs-Bundles (erforderlich für Tweaks mit SettingsViewController)
        cp -r extracted_tweak/Library/PreferenceBundles/BHTikTokSettings.bundle . || true 

    # 5. Speichern der kompilierte Dateien als Artifacts
    - name: Upload Tweak Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: BHTikTok-Assets
        path: |
          BHTikTok.dylib
          BHTikTok.plist
          BHTikTokSettings.bundle/
        retention-days: 1
